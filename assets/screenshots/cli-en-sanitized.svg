<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960" role="img" aria-labelledby="title desc">
<title id="title">AI Log Analysis CLI English screenshot</title>
<desc id="desc">Sanitized terminal preview of the English CLI without local filesystem paths.</desc>
<rect width="1400" height="960" fill="#1f2230"/>
<g font-family="Menlo, Monaco, Consolas, monospace" font-size="18">
<text x="700" y="70" text-anchor="middle" fill="#71c6ff">AI LOG ANALYSIS CLI</text>
<text x="700" y="110" text-anchor="middle" fill="#71c6ff">Linux server log analysis with a readable report for administrators</text>
<rect x="20" y="20" width="1360" height="130" fill="none" stroke="#71c6ff" stroke-width="2" stroke-dasharray="8 6"/>
<text x="20" y="180" fill="#a7db4d">[CFG]</text>
<text x="88" y="180" fill="#d7dcef">Loaded configuration: log-sources.json</text>
<rect x="20" y="210" width="1360" height="140" fill="none" stroke="#b58cff" stroke-width="2" stroke-dasharray="8 6"/>
<text x="40" y="245" fill="#d5b3ff">[ Session ]</text>
<text x="40" y="285" fill="#d7dcef">Configuration : log-sources.json</text>
<text x="40" y="315" fill="#d7dcef">Sources count : 9</text>
<text x="40" y="345" fill="#d7dcef">AI model      : gpt-4.1-mini</text>
<text x="40" y="375" fill="#d7dcef">Log limit     : 120000 bytes</text>
<text x="40" y="405" fill="#d7dcef">Reports       : analysis-output/</text>
<rect x="20" y="430" width="1360" height="470" fill="none" stroke="#71a2ff" stroke-width="2" stroke-dasharray="8 6"/>
<text x="40" y="465" fill="#8eb1ff">[ Available logs ]</text>
<text x="40" y="515" fill="#8eb1ff">1. Auth Log</text>
<text x="80" y="545" fill="#8eb1ff">Path:   /var/log/auth.log</text>
<text x="80" y="575" fill="#8eb1ff">Status: MISSING - File does not exist</text>
<text x="80" y="605" fill="#8eb1ff">Description: Logins, sudo, SSH, and access attempts</text>
<text x="40" y="665" fill="#8eb1ff">2. Syslog</text>
<text x="80" y="695" fill="#8eb1ff">Path:   /var/log/syslog</text>
<text x="80" y="725" fill="#8eb1ff">Status: MISSING - File does not exist</text>
<text x="80" y="755" fill="#8eb1ff">Description: Main system logs for Debian and Ubuntu</text>
<text x="40" y="815" fill="#8eb1ff">3. Messages</text>
<text x="80" y="845" fill="#8eb1ff">Path:   /var/log/messages</text>
<text x="80" y="875" fill="#8eb1ff">Status: MISSING - File does not exist</text>
<text x="80" y="905" fill="#8eb1ff">Description: Main system logs for RHEL, CentOS, and AlmaLinux</text>
<text x="20" y="940" fill="#d7dcef">Choose log number to analyze or q to quit: _</text>
</g>
</svg>
